<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBS아카데미 안산 — 수업시간표</title>
  <link rel="stylesheet" href="/assets/style.css" />
  <style>
    /* ── 탭 ── */
    .tabs {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .tab {
      padding: 8px 18px; border-radius: 20px; cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700;
      border: 1px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
      color: #999;
      transition: all 0.15s; white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .tab:hover { color: #1a1a2e; background: rgba(255,255,255,0.8); }
    .tab.active {
      background: rgba(255,255,255,0.95);
      color: #1a1a2e; font-weight: 900;
      border-color: rgba(167,139,250,0.4);
      box-shadow: 0 4px 16px rgba(139,92,246,0.15);
    }

    /* ── 달력 카드 ── */
    .cal-card {
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 22px; overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.9);
    }
    .cal-top {
      padding: 14px 24px;
      text-align: center;
      font-weight: 900; font-size: 14px; color: #1a1a2e;
      background: rgba(255,255,255,0.7);
      border-bottom: 1px solid rgba(255,255,255,0.6);
      letter-spacing: -0.01em;
    }
    .cal-weekdays {
      display: grid; grid-template-columns: repeat(5, 1fr);
      background: rgba(255,255,255,0.4);
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .cal-weekday {
      padding: 10px; text-align: center;
      font-size: 12px; font-weight: 700; color: #aaa;
      border-right: 1px solid rgba(0,0,0,0.05);
    }
    .cal-weekday:last-child { border-right: none; }

    .cal-body { padding: 10px; display: flex; flex-direction: column; gap: 6px; }
    .cal-week { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }

    .cal-day {
      border-radius: 12px; padding: 10px 8px;
      min-height: 76px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      border: 1.5px solid transparent;
    }
    .cal-day.empty {
      background: rgba(255,255,255,0.3);
      border-color: rgba(0,0,0,0.04);
    }
    .cal-day.class-blue {
      background: rgba(186,200,255,0.35);
      border-color: rgba(139,92,246,0.3);
    }
    .cal-day.class-orange {
      background: rgba(255,192,160,0.35);
      border-color: rgba(251,146,60,0.35);
    }

    .day-num {
      font-size: 13px; font-weight: 700; color: #ccc;
      align-self: flex-start; padding-left: 2px;
    }
    .cal-day.class-blue .day-num { color: #7c3aed; }
    .cal-day.class-orange .day-num { color: #ea580c; }

    .day-pill {
      font-size: 10px; font-weight: 700;
      padding: 3px 8px; border-radius: 20px;
      color: #fff; letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .cal-day.class-blue .day-pill { background: rgba(139,92,246,0.7); }
    .cal-day.class-orange .day-pill { background: rgba(251,146,60,0.8); }

    /* ── 범례 ── */
    .pat-desc {
      margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap;
    }
    .pat-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 20px; padding: 6px 14px;
      font-size: 12px; color: #888;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .pat-badge .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .pat-badge .dot.blue { background: rgba(139,92,246,0.7); }
    .pat-badge .dot.orange { background: rgba(251,146,60,0.8); }

    @media (max-width: 640px) {
      .cal-day { min-height: 58px; padding: 7px 4px; }
      .day-num { font-size: 11px; }
      .day-pill { font-size: 9px; padding: 2px 6px; }
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb1"></div>
  <div class="bg-orb bg-orb2"></div>
  <div class="bg-orb bg-orb3"></div>
  <div class="bg-orb bg-orb4"></div>

  <div class="wrap">
    <nav id="nav"></nav>
    <div class="page-wrap">
      <div class="hero">
        <div class="hero-tag"><span class="tag-dot"></span>SCHEDULE</div>
        <h1>SBS아카데미<br/><span class="g">수업시간표</span></h1>
        <p>2026년 3월 16일 ~ 4월 17일 (평일반)</p>
      </div>

      <div class="section" style="padding-top:0;">
        <div class="tabs">
          <button class="tab active" onclick="setTab(0,this)">① 월~목 (매일)</button>
          <button class="tab" onclick="setTab(1,this)">② 저녁 9일제 + 디지털드로잉</button>
          <button class="tab" onclick="setTab(2,this)">③ 오후 10일제</button>
          <button class="tab" onclick="setTab(3,this)">④ 백엔드마스터3</button>
        </div>

        <div class="cal-card">
          <div class="cal-top" id="calTitle"></div>
          <div class="cal-weekdays">
            <div class="cal-weekday">월</div>
            <div class="cal-weekday">화</div>
            <div class="cal-weekday">수</div>
            <div class="cal-weekday">목</div>
            <div class="cal-weekday">금</div>
          </div>
          <div class="cal-body" id="calBody"></div>
        </div>

        <div class="pat-desc" id="patDesc"></div>
      </div>
    </div>
  </div>

  <script src="/assets/nav.js"></script>
  <script>
    function dateKey(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function getWeeks() {
      const weeks = [];
      const start = new Date(2026, 2, 16);
      const end   = new Date(2026, 3, 17);
      let cur = new Date(start);
      let week = [];
      while (cur <= end) {
        const dow = cur.getDay();
        if (dow >= 1 && dow <= 5) {
          week.push(new Date(cur));
          if (dow === 5) { weeks.push([...week]); week = []; }
        }
        cur.setDate(cur.getDate() + 1);
      }
      if (week.length) {
        while (week.length < 5) week.push(null);
        weeks.push(week);
      }
      return weeks;
    }
    function allWeekdays() {
      const list = [];
      const start = new Date(2026, 2, 16);
      const end   = new Date(2026, 3, 10);
      let cur = new Date(start);
      while (cur <= end) {
        if (cur.getDay() >= 1 && cur.getDay() <= 5) list.push(new Date(cur));
        cur.setDate(cur.getDate() + 1);
      }
      return list;
    }
    function pattern1() {
      const map = new Map();
      allWeekdays().forEach(d => {
        if ([1,2,3,4].includes(d.getDay())) map.set(dateKey(d), 'blue');
      });
      return map;
    }
    function pattern2() {
      const map = new Map();
      const days = allWeekdays();
      const fridays = days.filter(d => d.getDay() === 5);
      days.forEach(d => {
        const dow = d.getDay();
        if ([1,3].includes(dow)) map.set(dateKey(d), 'blue');
        if ([2,4].includes(dow)) map.set(dateKey(d), 'orange');
      });
      ['orange','blue','orange'].forEach((c,i) => { if(fridays[i]) map.set(dateKey(fridays[i]), c); });
      return map;
    }
    function pattern3() {
      const map = new Map();
      const days = allWeekdays();
      const fridays = days.filter(d => d.getDay() === 5);
      days.forEach(d => {
        const dow = d.getDay();
        if ([1,3].includes(dow)) map.set(dateKey(d), 'blue');
        if ([2,4].includes(dow)) map.set(dateKey(d), 'orange');
      });
      ['blue','orange','blue','orange'].forEach((c,i) => { if(fridays[i]) map.set(dateKey(fridays[i]), c); });
      return map;
    }
    function pattern4() {
      const map = new Map();
      ['2026-03-24','2026-03-26','2026-03-31','2026-04-02','2026-04-03',
       '2026-04-07','2026-04-09','2026-04-14','2026-04-16']
        .forEach(ds => map.set(ds, 'orange'));
      return map;
    }
    const PATTERNS = [
      { title:'2026년 3월 16일 ~ 4월 10일 | 월~목 매일', map:pattern1,
        desc:[{color:'blue',text:'월·화·수·목 — 매일 수업'},{color:null,text:'금요일 — 수업 없음'}] },
      { title:'2026년 3월 16일 ~ 4월 10일 | 저녁 9일제 + 디지털드로잉', map:pattern2,
        desc:[{color:'blue',text:'월수금(월수) — 수업일'},{color:'orange',text:'화목화목금 — 수업일'}] },
      { title:'2026년 3월 16일 ~ 4월 10일 | 오후 10일제', map:pattern3,
        desc:[{color:'blue',text:'월수금월수 — 수업일'},{color:'orange',text:'화목화목금 — 수업일'}] },
      { title:'2026년 3월 16일 ~ 4월 17일 | 백엔드마스터3(자바2)', map:pattern4,
        desc:[{color:'orange',text:'화목화목금 (격일) — 개강 3/24'}] },
    ];
    let currentTab = 0;
    function setTab(idx, btn) {
      currentTab = idx;
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCalendar();
    }
    function renderCalendar() {
      const pat = PATTERNS[currentTab];
      const classMap = pat.map();
      const weeks = getWeeks();
      document.getElementById('calTitle').textContent = pat.title;
      const labelMap = [
        { blue:'월~목', orange:'' },
        { blue:'월수금', orange:'화목금' },
        { blue:'월수금', orange:'화목금' },
        { blue:'', orange:'화목금' },
      ];
      document.getElementById('calBody').innerHTML = weeks.map(week => `
        <div class="cal-week">
          ${week.map(d => {
            if (!d) return `<div class="cal-day empty"></div>`;
            const key = dateKey(d);
            const cls = classMap.get(key);
            const dayClass = cls ? `class-${cls}` : 'empty';
            const label = cls === 'blue' ? labelMap[currentTab].blue : cls === 'orange' ? labelMap[currentTab].orange : '';
            return `<div class="cal-day ${dayClass}">
              <span class="day-num">${d.getDate()}</span>
              ${cls ? `<span class="day-pill">${label}</span>` : ''}
            </div>`;
          }).join('')}
        </div>
      `).join('');
      document.getElementById('patDesc').innerHTML = pat.desc.map(d => `
        <div class="pat-badge">
          ${d.color ? `<div class="dot ${d.color}"></div>` : '<div style="width:10px"></div>'}
          <span>${d.text}</span>
        </div>
      `).join('');
    }
    renderCalendar();
  </script>
</body>
</html>
