<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBS아카데미 안산 — 격일시간표</title>
  <meta property="og:url" content="https://sbs-ansan-notice.co.kr/schedule/" />
  <meta property="og:title" content="SBS아카데미 안산 — 격일시간표" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://sbs-ansan-notice.co.kr/assets/og-image.png?v=2" />
  <meta property="og:site_name" content="SBS아카데미 안산" />
  <meta property="og:description" content="수강생 분들은 수업 전, 꼭 확인해주세요!" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://sbs-ansan-notice.co.kr/assets/og-image.png?v=2" />
  <link rel="stylesheet" href="/assets/style.css" />
  <style>
    .month-tabs {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .month-tab {
      padding: 7px 20px; border-radius: 20px; cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700;
      border: 1px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(10px);
      color: #bbb;
      transition: all 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .month-tab:hover { color: #1a1a2e; background: rgba(255,255,255,0.75); }
    .month-tab.active {
      background: rgba(255,255,255,0.95);
      color: #7c3aed; font-weight: 900;
      border-color: rgba(167,139,250,0.5);
      box-shadow: 0 4px 16px rgba(139,92,246,0.18);
    }
    .tabs {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .tab {
      padding: 8px 18px; border-radius: 20px; cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700;
      border: 1px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
      color: #999;
      transition: all 0.15s; white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .tab:hover { color: #1a1a2e; background: rgba(255,255,255,0.8); }
    .tab.active {
      background: rgba(255,255,255,0.95);
      color: #1a1a2e; font-weight: 900;
      border-color: rgba(167,139,250,0.4);
      box-shadow: 0 4px 16px rgba(139,92,246,0.15);
    }
    .cal-card {
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 22px; overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.9);
    }
    .cal-top {
      padding: 14px 24px; text-align: center;
      font-weight: 900; font-size: 14px; color: #1a1a2e;
      background: rgba(255,255,255,0.7);
      border-bottom: 1px solid rgba(255,255,255,0.6);
      letter-spacing: -0.01em;
    }
    .cal-weekdays {
      display: grid; grid-template-columns: repeat(5, 1fr);
      background: rgba(255,255,255,0.4);
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .cal-weekday {
      padding: 10px; text-align: center;
      font-size: 12px; font-weight: 700; color: #aaa;
      border-right: 1px solid rgba(0,0,0,0.05);
    }
    .cal-weekday:last-child { border-right: none; }
    .cal-body { padding: 10px; display: flex; flex-direction: column; gap: 6px; }
    .cal-week { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .cal-day {
      border-radius: 12px; padding: 10px 8px;
      min-height: 76px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      border: 1.5px solid transparent;
    }
    .cal-day.empty { background: rgba(255,255,255,0.3); border-color: rgba(0,0,0,0.04); }
    .cal-day.class-blue { background: rgba(186,200,255,0.35); border-color: rgba(139,92,246,0.3); }
    .cal-day.class-orange { background: rgba(255,192,160,0.35); border-color: rgba(251,146,60,0.35); }
    .cal-day.holiday { background: rgba(255,255,255,0.3); border-color: rgba(0,0,0,0.04); }
    .day-num { font-size: 13px; font-weight: 700; color: #ccc; align-self: flex-start; padding-left: 2px; }
    .cal-day.class-blue .day-num { color: #7c3aed; }
    .cal-day.class-orange .day-num { color: #ea580c; }
    .cal-day.holiday .day-num { color: #ef4444; }
    .day-pill {
      font-size: 10px; font-weight: 700;
      padding: 3px 8px; border-radius: 20px;
      color: #fff; letter-spacing: 0.02em; white-space: nowrap;
    }
    .cal-day.class-blue .day-pill { background: rgba(139,92,246,0.7); }
    .cal-day.class-orange .day-pill { background: rgba(251,146,60,0.8); }
    .holiday-label { font-size: 9px; font-weight: 700; color: #ef4444; text-align: center; line-height: 1.3; }
    .pat-desc { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
    .pat-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.6); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 20px; padding: 6px 14px;
      font-size: 12px; color: #888;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .pat-badge .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .pat-badge .dot.blue { background: rgba(139,92,246,0.7); }
    .pat-badge .dot.orange { background: rgba(251,146,60,0.8); }
    @media (max-width: 640px) {
      .cal-day { min-height: 58px; padding: 7px 4px; }
      .day-num { font-size: 11px; }
      .day-pill { font-size: 9px; padding: 2px 6px; }
      .holiday-label { font-size: 8px; }
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb1"></div>
  <div class="bg-orb bg-orb2"></div>
  <div class="bg-orb bg-orb3"></div>
  <div class="bg-orb bg-orb4"></div>

  <div class="wrap">
    <nav id="nav"></nav>
    <div class="page-wrap">
      <div class="hero">
        <div class="hero-tag"><span class="tag-dot"></span>SCHEDULE</div>
        <h1>SBS아카데미<br/><span class="g">격일시간표</span></h1>
        <p id="heroSub"></p>
      </div>

      <div class="section" style="padding-top:0;">
        <div class="month-tabs">
          <button class="month-tab" onclick="setMonth('mar',this)">3월 격일시간표</button>
          <button class="month-tab active" onclick="setMonth('apr',this)">4월 격일시간표</button>
        </div>

        <div class="tabs" id="tabBar"></div>

        <div class="cal-card">
          <div class="cal-top" id="calTitle"></div>
          <div class="cal-weekdays">
            <div class="cal-weekday">월</div>
            <div class="cal-weekday">화</div>
            <div class="cal-weekday">수</div>
            <div class="cal-weekday">목</div>
            <div class="cal-weekday">금</div>
          </div>
          <div class="cal-body" id="calBody"></div>
        </div>

        <div class="pat-desc" id="patDesc"></div>
      </div>
    </div>
  </div>

  <script src="/assets/nav.js"></script>
  <script>
    function dateKey(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    const HOLIDAYS = {
      '2026-05-01': '근로자의 날',
      '2026-05-05': '어린이날',
    };

    // ────── 3월 ──────
    function marGetWeeks() {
      const weeks = [];
      const START = new Date(2026, 2, 16);
      const END   = new Date(2026, 3, 17);
      let cur = new Date(START), week = [];
      while (cur <= END) {
        const dow = cur.getDay();
        if (dow >= 1 && dow <= 5) {
          week.push(new Date(cur));
          if (dow === 5) { weeks.push([...week]); week = []; }
        }
        cur.setDate(cur.getDate() + 1);
      }
      if (week.length) { while (week.length < 5) week.push(null); weeks.push(week); }
      return weeks;
    }
    function marAllWeekdays() {
      const list = [], cur = new Date(2026, 2, 16), end = new Date(2026, 3, 10);
      while (cur <= end) { if (cur.getDay()>=1&&cur.getDay()<=5) list.push(new Date(cur)); cur.setDate(cur.getDate()+1); }
      return list;
    }
    function marP1() {
      const map = new Map();
      marAllWeekdays().forEach(d => { if ([1,2,3,4].includes(d.getDay())) map.set(dateKey(d),'blue'); });
      return map;
    }
    function marP2() {
      const map = new Map();
      const days = marAllWeekdays(), fris = days.filter(d=>d.getDay()===5);
      days.forEach(d => {
        if ([1,3].includes(d.getDay())) map.set(dateKey(d),'blue');
        if ([2,4].includes(d.getDay())) map.set(dateKey(d),'orange');
      });
      ['orange','blue','orange'].forEach((c,i)=>{ if(fris[i]) map.set(dateKey(fris[i]),c); });
      return map;
    }
    function marP3() {
      const map = new Map();
      const days = marAllWeekdays(), fris = days.filter(d=>d.getDay()===5);
      days.forEach(d => {
        if ([1,3].includes(d.getDay())) map.set(dateKey(d),'blue');
        if ([2,4].includes(d.getDay())) map.set(dateKey(d),'orange');
      });
      ['blue','orange','blue','orange'].forEach((c,i)=>{ if(fris[i]) map.set(dateKey(fris[i]),c); });
      return map;
    }
    function marP4() {
      const map = new Map();
      ['2026-03-24','2026-03-26','2026-03-31','2026-04-02','2026-04-03',
       '2026-04-07','2026-04-09','2026-04-14','2026-04-16'].forEach(ds=>map.set(ds,'orange'));
      return map;
    }
    const MAR_PATTERNS = [
      { title:'2026년 3월 16일 ~ 4월 10일 | 월~목 매일', map:marP1,
        desc:[{color:'blue',text:'월·화·수·목 — 매일 수업'},{color:null,text:'금요일 — 수업 없음'}],
        lm:{ blue:'월~목', orange:'' } },
      { title:'2026년 3월 16일 ~ 4월 10일 | 저녁 9일제 + 디지털드로잉', map:marP2,
        desc:[{color:'blue',text:'월수(금) — 수업일'},{color:'orange',text:'화목(금) — 수업일'}],
        lm:{ blue:'월수금', orange:'화목금' } },
      { title:'2026년 3월 16일 ~ 4월 10일 | 오후 10일제', map:marP3,
        desc:[{color:'blue',text:'월수(금) — 수업일'},{color:'orange',text:'화목(금) — 수업일'}],
        lm:{ blue:'월수금', orange:'화목금' } },
      { title:'2026년 3월 16일 ~ 4월 17일 | 백엔드마스터3(자바2)', map:marP4,
        desc:[{color:'orange',text:'화목화목금 (격일) — 개강 3/24'}],
        lm:{ blue:'', orange:'화목금' } },
    ];
    const MAR_TABS = ['① 월~목 (매일)','② 저녁 9일제 + 디지털드로잉','③ 오후 10일제','④ 백엔드마스터3'];

    // ────── 4월 ──────
    // 달력 범위: 4/13(월) ~ 5/15(금) — 가장 긴 과목(웹1) 포함
    function aprGetWeeks() {
      const weeks = [];
      const START = new Date(2026, 3, 13);
      const END   = new Date(2026, 4, 15);
      let cur = new Date(START), week = [];
      while (cur <= END) {
        const dow = cur.getDay();
        if (dow >= 1 && dow <= 5) {
          week.push(new Date(cur));
          if (dow === 5) { weeks.push([...week]); week = []; }
        }
        cur.setDate(cur.getDate() + 1);
      }
      if (week.length) { while (week.length < 5) week.push(null); weeks.push(week); }
      return weeks;
    }

    // 이미지1: 월~목 매일 (4/13~5/11, 월~목 파랑, 5/1근로자날·5/5어린이날 제외)
    function aprP1() {
      const map = new Map();
      const START = new Date(2026, 3, 13), END = new Date(2026, 4, 11);
      let cur = new Date(START);
      while (cur <= END) {
        const key = dateKey(cur), dow = cur.getDay();
        if ([1,2,3,4].includes(dow) && !HOLIDAYS[key]) map.set(key,'blue');
        cur.setDate(cur.getDate()+1);
      }
      return map;
    }

    // 이미지2: 저녁9일제+디지털드로잉 (4/13~5/8 기준 9일)
    // 월수→파랑, 화목→주황, 금→[파,주,파,주] 순 (4/17파랑, 4/24주황, 5/8주황)
    // 실제이미지2: 17(금)파랑, 24(금)주황, 5/1근로자날, 5/8(금)주황 → 총9일
    function aprP2() {
      const map = new Map();
      // 이미지2 직접 수동 입력 (9일+디지털드로잉)
      // 파랑(월수금): 4/13(월),4/15(수),4/17(금), 4/20(월),4/22(수), 4/27(월),4/29(수), 5/4(월),5/6(수)
      // 주황(화목금): 4/14(화),4/16(목), 4/21(화),4/23(목),4/24(금), 4/28(화),4/30(목), 5/7(목),5/8(금)
      const blue  = ['2026-04-13','2026-04-15','2026-04-17',
                     '2026-04-20','2026-04-22',
                     '2026-04-27','2026-04-29',
                     '2026-05-04','2026-05-06'];
      const orange= ['2026-04-14','2026-04-16',
                     '2026-04-21','2026-04-23','2026-04-24',
                     '2026-04-28','2026-04-30',
                     '2026-05-07','2026-05-08'];
      blue.forEach(ds=>map.set(ds,'blue'));
      orange.forEach(ds=>map.set(ds,'orange'));
      return map;
    }

    // 이미지3: 오후10일제 — 이미지2와 동일 + 5/11(월)파랑, 5/12(화)주황
    function aprP3() {
      const map = aprP2();
      map.set('2026-05-11','blue');
      map.set('2026-05-12','orange');
      return map;
    }

    // 이미지4: 백엔드마스터4 (4/21~5/14, 화목금 격일 주황)
    // 이미지: 21(화)주황, 23(목)주황, 24(금)주황, 28(화)주황, 30(목)주황,
    //         5/7(목)주황, 5/8(금)주황, 5/12(화)주황, 5/14(목)주황
    function aprP4() {
      const map = new Map();
      ['2026-04-21','2026-04-23','2026-04-24',
       '2026-04-28','2026-04-30',
       '2026-05-07','2026-05-08',
       '2026-05-12','2026-05-14'].forEach(ds=>map.set(ds,'orange'));
      return map;
    }

    // 이미지5: 웹1 (4/20~5/15, 월수금 파랑 격일)
    // 이미지: 20(월)파랑, 22(수)파랑, 27(월)파랑, 29(수)파랑,
    //         5/4(월)파랑, 5/6(수)파랑, 5/11(월)파랑, 5/13(수)파랑, 5/15(금)파랑
    function aprP5() {
      const map = new Map();
      ['2026-04-20','2026-04-22',
       '2026-04-27','2026-04-29',
       '2026-05-04','2026-05-06',
       '2026-05-11','2026-05-13','2026-05-15'].forEach(ds=>map.set(ds,'blue'));
      return map;
    }

    const APR_PATTERNS = [
      { title:'2026년 4월 13일 ~ 5월 11일 | 월~목 매일', map:aprP1,
        desc:[{color:'blue',text:'월·화·수·목 — 매일 수업'},{color:null,text:'금·공휴일 — 수업 없음'}],
        lm:{ blue:'월~목', orange:'' } },
      { title:'2026년 4월 13일 ~ 5월 8일 | 저녁 9일제 + 디지털드로잉', map:aprP2,
        desc:[{color:'blue',text:'월수금 — 수업일'},{color:'orange',text:'화목금 — 수업일'}],
        lm:{ blue:'월수금', orange:'화목금' } },
      { title:'2026년 4월 13일 ~ 5월 12일 | 오후 10일제', map:aprP3,
        desc:[{color:'blue',text:'월수금 — 수업일'},{color:'orange',text:'화목금 — 수업일'}],
        lm:{ blue:'월수금', orange:'화목금' } },
      { title:'2026년 4월 21일 ~ 5월 14일 | 백엔드마스터4', map:aprP4,
        desc:[{color:'orange',text:'화·목·금 격일 — 개강 4/21'}],
        lm:{ blue:'', orange:'화목금' } },
      { title:'2026년 4월 20일 ~ 5월 15일 | 웹1', map:aprP5,
        desc:[{color:'blue',text:'월·수·금 격일 — 개강 4/20'}],
        lm:{ blue:'월수금', orange:'' } },
    ];
    const APR_TABS = ['① 월~목 (매일)','② 저녁 9일제 + 디지털드로잉','③ 오후 10일제','④ 백엔드마스터4','⑤ 웹1'];

    // ────── 상태 ──────
    let currentMonth = 'apr', currentTab = 0;

    function setMonth(m, btn) {
      currentMonth = m; currentTab = 0;
      document.querySelectorAll('.month-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderTabs(); renderCalendar(); updateHero();
    }
    function setTab(idx, btn) {
      currentTab = idx;
      document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderCalendar();
    }
    function renderTabs() {
      const tabs = currentMonth==='mar' ? MAR_TABS : APR_TABS;
      document.getElementById('tabBar').innerHTML = tabs.map((t,i)=>
        `<button class="tab${i===0?' active':''}" onclick="setTab(${i},this)">${t}</button>`
      ).join('');
    }
    function updateHero() {
      const labels = { mar:'2026년 3월 격일시간표 (3/16 ~ 4/17)', apr:'2026년 4월 격일시간표 (4/13 ~ 5/15)' };
      document.getElementById('heroSub').textContent = labels[currentMonth];
    }
    function renderCalendar() {
      const pats = currentMonth==='mar' ? MAR_PATTERNS : APR_PATTERNS;
      const pat = pats[currentTab];
      const classMap = pat.map();
      const weeks = currentMonth==='mar' ? marGetWeeks() : aprGetWeeks();
      document.getElementById('calTitle').textContent = pat.title;
      document.getElementById('calBody').innerHTML = weeks.map(week=>`
        <div class="cal-week">
          ${week.map(d=>{
            if (!d) return `<div class="cal-day empty"></div>`;
            const key = dateKey(d), holiday = HOLIDAYS[key], cls = classMap.get(key);
            if (holiday) return `<div class="cal-day holiday"><span class="day-num">${d.getDate()}</span><span class="holiday-label">${holiday}</span></div>`;
            const dayClass = cls ? `class-${cls}` : 'empty';
            const label = cls==='blue' ? pat.lm.blue : cls==='orange' ? pat.lm.orange : '';
            return `<div class="cal-day ${dayClass}">
              <span class="day-num">${d.getDate()}</span>
              ${cls&&label?`<span class="day-pill">${label}</span>`:''}
            </div>`;
          }).join('')}
        </div>
      `).join('');
      document.getElementById('patDesc').innerHTML = pat.desc.map(d=>`
        <div class="pat-badge">
          ${d.color?`<div class="dot ${d.color}"></div>`:'<div style="width:10px"></div>'}
          <span>${d.text}</span>
        </div>
      `).join('');
    }
    renderTabs(); renderCalendar(); updateHero();
  </script>
</body>
</html>
